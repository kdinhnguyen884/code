<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduHub - Hồ sơ Chi tiết</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Roboto',sans-serif;
    background:#f4f7fb;
    color:#1e293b;
    transition:.3s;
    padding:20px
}
.container{max-width:1000px;margin:auto}

/* ===== Header ===== */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px
}
header h2{
    font-family:Montserrat;
    font-size:22px
}
.back-link{
    text-decoration:none;
    color:#2563eb;
    font-weight:500
}

/* ===== Layout ===== */
.grid-layout{
    display:grid;
    grid-template-columns:320px 1fr;
    gap:20px
}
@media(max-width:900px){
    .grid-layout{grid-template-columns:1fr}
}

/* ===== Card ===== */
.card{
    background:#fff;
    border-radius:22px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.06);
    transition:.3s
}

/* ===== Side Info ===== */
.side-info{text-align:center}
.avatar-circle{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:0 auto 15px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:#fff;
    font-size:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 0 6px rgba(124,58,237,.15);
    animation:pulse 2s infinite
}
@keyframes pulse{
    0%{box-shadow:0 0 0 6px rgba(124,58,237,.15)}
    50%{box-shadow:0 0 0 12px rgba(124,58,237,.05)}
    100%{box-shadow:0 0 0 6px rgba(124,58,237,.15)}
}
.user-rank{
    display:inline-block;
    margin-top:6px;
    background:#fef3c7;
    color:#d97706;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600
}
.stats{
    margin-top:20px;
    font-size:13px;
    text-align:left
}
.stats p{margin-bottom:6px}

/* ===== Form ===== */
.form-section{
    margin-bottom:25px;
    padding-bottom:20px;
    border-bottom:1px solid #f1f5f9
}
.form-section h3{
    margin-bottom:15px;
    font-family:Montserrat;
    font-size:18px;
    color:#1e3a8a
}
.input-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:15px
}
@media(max-width:600px){
    .input-row{grid-template-columns:1fr}
}
label{
    font-size:13px;
    font-weight:500;
    color:#64748b;
    margin-bottom:5px;
    display:block
}
input,select,textarea{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    font-size:14px;
    outline:none;
    transition:.2s
}
input:focus,select:focus,textarea:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15)
}
textarea{height:70px;resize:none}

/* ===== Buttons ===== */
.btn-group{
    display:flex;
    gap:12px;
    margin-top:20px
}
.btn-save{
    flex:1;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:#fff;
    border:none;
    padding:13px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer
}
.btn-save:hover{opacity:.9}
.btn-reset{
    background:#f1f5f9;
    color:#64748b;
    border:none;
    padding:13px 18px;
    border-radius:12px;
    cursor:pointer
}

/* ===== Dark Mode ===== */
.dark body{background:#0f172a;color:#e5e7eb}
.dark .card{background:#1e293b}
.dark input,.dark select,.dark textarea{
    background:#0f172a;
    border-color:#334155;
    color:#fff
}
.dark .form-section{border-color:#334155}
.dark .back-link{color:#93c5fd}
</style>
</head>

<body>

<div class="container">
<header>
    <a class="back-link" href="dashboard.html">← Quay lại hệ thống</a>
    <h2>Thiết lập tài khoản</h2>
</header>

<div class="grid-layout">

<!-- SIDE -->
<div class="side-info card">
    <div class="avatar-circle" id="avatarLetter">U</div>
    <h2 id="displayName">Người dùng</h2>
    <span class="user-rank">Chiến binh kiến thức</span>

    <div class="stats">
        <p>📅 Tham gia: <b id="joinDate"></b></p>
        <p>🏆 Module hoàn thành: <b>12</b></p>
    </div>
</div>

<!-- FORM -->
<div class="card">

<div class="form-section">
<h3>👤 Thông tin cơ bản</h3>
<div class="input-row">
    <div>
        <label>Họ và tên</label>
        <input id="nameInput">
    </div>
    <div>
        <label>Email</label>
        <input type="email" id="emailInput">
    </div>
</div>
<div class="input-row">
    <div>
        <label>Ngày sinh</label>
        <input type="date" id="dobInput">
    </div>
    <div>
        <label>Giới tính</label>
        <select id="genderInput">
            <option>Nam</option>
            <option>Nữ</option>
            <option>Khác</option>
        </select>
    </div>
</div>
</div>

<div class="form-section">
<h3>🎯 Mục tiêu & Châm ngôn</h3>
<div class="input-row">
    <div>
        <label>Mục tiêu học (giờ/ngày)</label>
        <input type="number" min="1" max="24" id="goalInput">
    </div>
    <div>
        <label>Giao diện</label>
        <select id="themeInput" onchange="applyTheme(this.value)">
            <option value="light">Chế độ Sáng</option>
            <option value="dark">Chế độ Tối</option>
        </select>
    </div>
</div>
<label>Châm ngôn yêu thích</label>
<textarea id="bioInput"></textarea>
</div>

<div class="btn-group">
    <button class="btn-reset" onclick="location.reload()">Hủy</button>
    <button class="btn-save" onclick="saveAll()">Cập nhật hồ sơ</button>
</div>

</div>
</div>
</div>

<script>
/* ====== EDUHUB GLOBAL PROFILE ====== */
const PROFILE_KEY = "EDUHUB_USER_PROFILE";

/* ====== INIT PROFILE ====== */
let profile = JSON.parse(localStorage.getItem(PROFILE_KEY));

if(!profile){
    profile = {
        username: localStorage.getItem("currentUser") || "User",
        name: "Người dùng",
        email: "user@eduhub.com",
        avatar: "U",
        dob: "2000-01-01",
        gender: "Nam",
        goal: 2,
        bio: "Chưa có châm ngôn.",
        joinDate: new Date().toLocaleDateString("vi-VN"),
        theme: "light"
    };
    localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
}

/* ====== APPLY THEME ====== */
function applyTheme(theme){
    document.body.classList.toggle("dark", theme === "dark");
    localStorage.setItem("dark", theme === "dark" ? "1" : "0");
}

/* ====== LOAD DATA ====== */
function loadData(){
    avatarLetter.textContent = profile.avatar || profile.name.charAt(0).toUpperCase();
    displayName.textContent = profile.name;
    joinDate.textContent = profile.joinDate;

    nameInput.value = profile.name;
    emailInput.value = profile.email;
    dobInput.value = profile.dob;
    genderInput.value = profile.gender;
    goalInput.value = profile.goal;
    bioInput.value = profile.bio;
    themeInput.value = profile.theme;

    applyTheme(profile.theme);
}

/* ====== SAVE & SYNC ====== */
function saveAll(){
    profile.name   = nameInput.value.trim();
    profile.email = emailInput.value.trim();
    profile.dob   = dobInput.value;
    profile.gender = genderInput.value;
    profile.goal  = goalInput.value;
    profile.bio   = bioInput.value;
    profile.theme = themeInput.value;
    profile.avatar = profile.name.charAt(0).toUpperCase();

    localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));

    /* 🔄 BẮN SỰ KIỆN ĐỒNG BỘ */
    window.dispatchEvent(new Event("eduhub-profile-updated"));

    alert("🎉 Hồ sơ đã được đồng bộ toàn hệ thống!");
    location.reload();
}

loadData();
</script>

</body>
</html>
