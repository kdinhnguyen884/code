<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro - Hệ Thống Ngân Hàng Câu Hỏi</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1976d2;
            --danger: #d32f2f;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        h1 { font-size: 24px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.98); }
        .btn-excel { background: var(--secondary); }
        .btn-clear { background: var(--danger); }
        .btn-save { background: var(--primary); width: 100%; justify-content: center; height: 45px; margin-top: 15px; }

        .admin-box { background: #fdfdfd; padding: 25px; border-radius: 12px; border: 1px dashed #cbd5e1; margin-bottom: 30px; }
        .guide { font-size: 13px; color: #64748b; background: #f1f5f9; padding: 12px; border-radius: 8px; margin: 15px 0; border-left: 4px solid var(--primary); }

        label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); }

        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; min-height: 180px; font-family: 'Consolas', monospace; font-size: 14px; resize: vertical; outline: none; }
        textarea:focus { border-color: var(--primary); }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; background: #f8fafc; color: #64748b; font-weight: 600; padding: 15px; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; vertical-align: top; }
        tr:hover { background: #fcfcfc; }

        .subject-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .del-link { color: var(--danger); text-decoration: none; font-weight: 600; cursor: pointer; }
        .del-link:hover { text-decoration: underline; }

        /* Loader */
        .status-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 30px; }
    </style>
</head>

<body>

<div class="container">
    <header>
        <h1>🧠 Quản Trị Hệ Thống</h1>
        <div class="btn-group">
            <button class="btn btn-excel" onclick="exportExcel()">📤 Xuất Excel</button>
            <button class="btn btn-clear" onclick="clearData()">🗑️ Xóa hết</button>
        </div>
    </header>

    <div class="admin-box">
        <h3>📥 Nạp Dữ Liệu Hàng Loạt</h3>
        <div class="guide">
            <b>Mẹo:</b> Soạn trên Excel rồi Copy-Paste trực tiếp vào đây. <br>
            Cấu trúc: Câu hỏi | Đáp án A | Đáp án B | Đáp án C | Đáp án D | Đáp án đúng (0-3 hoặc A-D)
        </div>

        <label>Chọn môn học đích:</label>
        <select id="sel-sub">
            <option value="Khoa học tự nhiên">🧪 Khoa học tự nhiên</option>
            <option value="Toán">📐 Toán học</option>
            <option value="Văn">📚 Ngữ văn</option>
            <option value="Anh">🌏 Tiếng Anh</option>
        </select>

        <label>Dán dữ liệu (Hỗ trợ Tab hoặc dấu |):</label>
        <textarea id="raw-input" placeholder="Câu hỏi 1	A	B	C	D	0..."></textarea>

        <button class="btn btn-save" onclick="processData(event)">
            💾 PHÂN TÍCH & LƯU VÀO KHO
        </button>
    </div>

    <div class="status-bar">
        <h3>🗂️ Danh sách câu hỏi (<span id="count" style="color:var(--primary)">0</span>)</h3>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="15%">Môn</th>
                    <th>Nội dung câu hỏi</th>
                    <th width="10%">Thao tác</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
/* ==== BẢO MẬT TRUY CẬP ==== */
const ADMIN_PASS = "123456"; 
if (sessionStorage.getItem('admin_login') !== 'true') {
    const pass = prompt("Nhập mật khẩu quản trị:");
    if (pass === ADMIN_PASS) {
        sessionStorage.setItem('admin_login', 'true');
    } else {
        alert("Sai mật khẩu!");
        window.location.href = "index.html"; 
    }
}

const DB_KEY = 'exam_system_db';

/* ==== XỬ LÝ NHẬP LIỆU HÀNG LOẠT ==== */
function processData(e) {
    if(e) e.preventDefault(); // Ngăn chặn load trang cực kỳ quan trọng

    const raw = document.getElementById('raw-input').value.trim();
    const subject = document.getElementById('sel-sub').value;
    
    if (!raw) {
        alert("⚠️ Vui lòng dán dữ liệu!");
        return;
    }

    const rows = raw.split('\n');
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    let countSuccess = 0;

    rows.forEach(row => {
        if (!row.trim()) return;

        // Tách theo Tab (Excel) hoặc dấu gạch đứng |
        let cols = row.split('\t');
        if (cols.length < 6) cols = row.split('|');

        if (cols.length >= 6) {
            // Chuẩn hóa đáp án đúng (Hỗ trợ cả số 0-3 và chữ A-D)
            let correctRaw = cols[5].trim().toUpperCase();
            let correct;
            
            if (["A", "0"].includes(correctRaw)) correct = 0;
            else if (["B", "1"].includes(correctRaw)) correct = 1;
            else if (["C", "2"].includes(correctRaw)) correct = 2;
            else if (["D", "3"].includes(correctRaw)) correct = 3;
            else correct = parseInt(correctRaw);

            if (!isNaN(correct) && correct >= 0 && correct <= 3) {
                db.push({
                    id: Date.now() + Math.random(),
                    subject: subject,
                    text: cols[0].trim(),
                    options: [
                        cols[1].trim(), cols[2].trim(), 
                        cols[3].trim(), cols[4].trim()
                    ],
                    correct: correct
                });
                countSuccess++;
            }
        }
    });

    localStorage.setItem(DB_KEY, JSON.stringify(db));
    document.getElementById('raw-input').value = ""; // Xóa input sau khi nạp xong
    render();
    alert(`✅ Thành công! Đã thêm ${countSuccess} câu hỏi mới vào môn ${subject}.`);
}

/* ==== RENDER DANH SÁCH ==== */
function render() {
    const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    const countEl = document.getElementById('count');
    const tableBody = document.getElementById('table-body');
    
    countEl.innerText = db.length;

    // Hiển thị 50 câu mới nhất để tránh lag trang
    const html = db.slice().reverse().slice(0, 50).map((q, index) => {
        // Tính toán lại index thật trong mảng db gốc
        const realIndex = db.length - 1 - index;
        return `
            <tr>
                <td><span class="subject-badge">${q.subject}</span></td>
                <td>
                    <div style="font-weight:500; margin-bottom:5px;">${q.text}</div>
                    <div style="font-size:12px; color:#64748b">
                        A: ${q.options[0]} | B: ${q.options[1]} | C: ${q.options[2]} | D: ${q.options[3]} 
                        <b style="color:var(--primary)"> (Đáp án: ${String.fromCharCode(65 + q.correct)})</b>
                    </div>
                </td>
                <td>
                    <span class="del-link" onclick="deleteItem(${realIndex})">Xóa</span>
                </td>
            </tr>
        `;
    }).join('');

    tableBody.innerHTML = html || '<tr><td colspan="3" style="text-align:center; color:#94a3b8">Chưa có câu hỏi nào trong kho dữ liệu.</td></tr>';
}

/* ==== XÓA DỮ LIỆU ==== */
window.deleteItem = function(i) {
    if (!confirm("Bạn muốn xóa câu hỏi này?")) return;
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    db.splice(i, 1);
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    render();
};

function clearData() {
    if (confirm("⚠️ CẢNH BÁO: Hành động này sẽ xóa sạch toàn bộ ngân hàng câu hỏi. Bạn chắc chắn chứ?")) {
        localStorage.removeItem(DB_KEY);
        render();
    }
}

/* ==== XUẤT EXCEL (PRO) ==== */
function exportExcel() {
    const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
    if (db.length === 0) return alert("⚠️ Kho dữ liệu trống!");

    const data = [
        ["MÔN HỌC", "NỘI DUNG CÂU HỎI", "ĐÁP ÁN A", "ĐÁP ÁN B", "ĐÁP ÁN C", "ĐÁP ÁN D", "CHỈ SỐ ĐÚNG (0-3)"]
    ];

    db.forEach(q => {
        data.push([
            q.subject, q.text,
            q.options[0], q.options[1], q.options[2], q.options[3],
            q.correct
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "QuestionBank");
    XLSX.writeFile(wb, `ngan_hang_cau_hoi_${new Date().toLocaleDateString()}.xlsx`);
}

// Khởi tạo lần đầu
window.onload = render;
</script>

</body>
</html>
