/* ================= RENDER ================= */

function renderVideos(videos){
 const grid=document.getElementById("resultGrid");
 grid.innerHTML=videos.map(v=>`
  <div class="res-card">
   <span class="res-type">Video học tập</span>
   <h3 class="res-title">${v.title}</h3>
   <p class="res-desc">${v.desc}</p>
   <a href="${v.link}" target="_blank" class="btn-view">Xem video</a>
  </div>
 `).join("");
}

/* ================= LOGIC ================= */

function suggestVideo(){
 const input=document.getElementById("questionInput").value.trim().toLowerCase();

 if(input===""){
   renderVideos(defaultVideos);
   return;
 }

 const matched=topicVideos.filter(v =>
   v.keywords.some(k => input.includes(k))
 );

 if(matched.length===0){
   document.getElementById("resultGrid").innerHTML=
   `<p style="grid-column:1/-1;text-align:center;color:#64748b">
     ❌ Chưa có video phù hợp
   </p>`;
   return;
 }

 renderVideos(matched);
}

/* ================= LOAD BAN ĐẦU ================= */
renderVideos(defaultVideos);
</script>
