<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Space Vanguard: ACE PILOT</title>
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --item-hp: #39ff14; --item-cool: #00d4ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-ui { position: absolute; top: 20px; left: 20px; z-index: 10; width: 250px; pointer-events: none; }
        .bar-container { width: 100%; height: 6px; background: #111; border-radius: 3px; margin: 4px 0 10px 0; border: 1px solid #333; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: var(--item-hp); box-shadow: 0 0 10px var(--item-hp); }
        #heat-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff4500); }
        #score-val { font-size: 35px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        canvas { background: #000; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="score-val">0000</div>
        <div style="font-size:10px; color:var(--item-hp);">HULL</div>
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div style="font-size:10px; color:orange;">GUN HEAT</div>
        <div class="bar-container"><div id="heat-bar"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, health = 100, heat = 0, gameActive = true;
        let isJammed = false, shake = 0;
        let enemies = [], bullets = [], drops = [], particles = [];
        const keys = { w: false, a: false, s: false, d: false, mouse: false };

        const player = { 
            x: canvas.width / 2, y: canvas.height / 2, 
            vx: 0, vy: 0, acc: 0.8, friction: 0.96, bounce: 0.8,
            angle: 0, size: 16
        };

        // Input logic
        window.onkeydown = e => { if(e.code.includes('Key')) keys[e.code.toLowerCase().replace('key','')] = true; };
        window.onkeyup = e => { if(e.code.includes('Key')) keys[e.code.toLowerCase().replace('key','')] = false; };
        window.onmousedown = () => keys.mouse = true;
        window.onmouseup = () => keys.mouse = false;

        function createParticles(x, y, color, count = 10, speed = 3) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * speed, 
                    vy: (Math.random() - 0.5) * speed,
                    life: 1.0,
                    color: color
                });
            }
        }

        function spawnEnemy() {
            if(!gameActive) return;
            const side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0) { x=Math.random()*canvas.width; y=-50; }
            else if(side===1) { x=canvas.width+50; y=Math.random()*canvas.height; }
            else if(side===2) { x=Math.random()*canvas.width; y=canvas.height+50; }
            else { x=-50; y=Math.random()*canvas.height; }

            const size = 10 + Math.random() * 20;
            enemies.push({ x, y, size: size, speed: 5 - (size/10), hp: Math.ceil(size/10) });
            setTimeout(spawnEnemy, Math.max(50, 600 - score/50));
        }

        function update() {
            if(!gameActive) return;

            // Vật lý di chuyển
            if(keys.w) player.vy -= player.acc; if(keys.s) player.vy += player.acc;
            if(keys.a) player.vx -= player.acc; if(keys.d) player.vx += player.acc;

            player.vx *= player.friction; player.vy *= player.friction;
            player.x += player.vx; player.y += player.vy;

            if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
                player.angle = Math.atan2(player.vy, player.vx);
                // Hiệu ứng đuôi lửa
                if(Math.random() > 0.5) createParticles(player.x - Math.cos(player.angle)*15, player.y - Math.sin(player.angle)*15, '#ff6600', 1, 1);
            }

            // Bật biên
            if (player.x < player.size || player.x > canvas.width - player.size) { player.vx = -player.vx * player.bounce; player.x = player.x < player.size ? player.size : canvas.width - player.size; shake = 10; }
            if (player.y < player.size || player.y > canvas.height - player.size) { player.vy = -player.vy * player.bounce; player.y = player.y < player.size ? player.size : canvas.height - player.size; shake = 10; }

            // Heat & Shooting
            if(keys.mouse && !isJammed) {
                heat += 2;
                if(Math.random() < 0.4) bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle)*18, vy: Math.sin(player.angle)*18 });
                if(heat >= 100) isJammed = true;
            } else {
                heat = Math.max(0, heat - 1);
                if(heat < 5) isJammed = false;
            }

            // Xử lý quái
            enemies.forEach((en, i) => {
                const dx = player.x - en.x, dy = player.y - en.y, dist = Math.sqrt(dx*dx+dy*dy);
                en.x += (dx/dist) * en.speed; en.y += (dy/dist) * en.speed;

                if(dist < en.size + 15) { health -= 0.5; shake = 5; }

                bullets.forEach((b, bi) => {
                    if(Math.sqrt((b.x-en.x)**2 + (b.y-en.y)**2) < en.size) {
                        en.hp--;
                        bullets.splice(bi, 1);
                        createParticles(en.x, en.y, '#ff3300', 3, 2);
                        if(en.hp <= 0) {
                            createParticles(en.x, en.y, '#ff3300', 15, 5);
                            if(Math.random() < 0.2) drops.push({x: en.x, y: en.y, type: Math.random() < 0.5 ? 'hp' : 'cool'});
                            enemies.splice(i, 1); score += 20;
                        }
                    }
                });
            });

            // Hạt hiệu ứng
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            });

            // Vật phẩm
            drops.forEach((d, i) => {
                if(Math.sqrt((d.x-player.x)**2 + (d.y-player.y)**2) < 30) {
                    if(d.type === 'hp') health = Math.min(100, health + 20); else heat = 0;
                    drops.splice(i, 1);
                }
            });

            bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1); });

            if(health <= 0) gameActive = false;
            document.getElementById('score-val').innerText = score.toString().padStart(4, '0');
            document.getElementById('hp-bar').style.width = health + '%';
            document.getElementById('heat-bar').style.width = heat + '%';
            if(shake > 0) shake--;
        }

        function draw() {
            ctx.save();
            if(shake > 0) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // Vẽ hạt (Particles)
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Vẽ Drops
            drops.forEach(d => {
                ctx.fillStyle = d.type === 'hp' ? '#39ff14' : '#00d4ff';
                ctx.beginPath(); ctx.arc(d.x, d.y, 8, 0, 7); ctx.fill();
            });

            // Vẽ Player
            ctx.save();
            ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.strokeStyle = isJammed ? '#555' : '#fff'; ctx.lineWidth = 3;
            ctx.shadowBlur = isJammed ? 0 : 20; ctx.shadowColor = '#0ff';
            ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, -12); ctx.lineTo(-10, 0); ctx.lineTo(-15, 12); ctx.closePath(); ctx.stroke();
            ctx.restore();

            // Vẽ Quái
            enemies.forEach(en => {
                ctx.fillStyle = '#ff3333';
                ctx.beginPath(); ctx.arc(en.x, en.y, en.size, 0, 7); ctx.fill();
            });

            // Vẽ Đạn
            ctx.fillStyle = '#0ff'; bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));

            ctx.restore();
            update();
            if(gameActive) requestAnimationFrame(draw);
            else { ctx.fillStyle='white'; ctx.font='40px Arial'; ctx.textAlign='center'; ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2); }
        }

        spawnEnemy(); draw();
    </script>
</body>
</html>
